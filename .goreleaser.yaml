# .goreleaser.yaml
# Documentación: https://goreleaser.com
version: 2

project_name: go-arch

before:
  hooks:
    - go mod tidy

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
    main: ./main.go
    binary: go-arch

archives:
  - format: tar.gz
    # use zip for windows archives
    format_overrides:
      - goos: windows
        format: zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - README.md
      - docs/*

nfpms:
  - id: default
    package_name: go-arch
    file_name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats:
      - deb
      - rpm
    contents:
      - src: ./docs/COMMANDS.md
        dst: /usr/share/doc/go-arch/COMMANDS.md

aurs:
  - name: go-arch-bin
    description: "GO CLI for project scaffolding with Clean Architecture"
    homepage: "https://github.com/SalvucciFacundo/go-arch-cli"
    maintainers:
      - "SalvucciFacundo <facundo@example.com>"
    license: "MIT"
    skip_upload: true # Generamos el PKGBUILD pero no intentamos subirlo al AUR sin SSH keys
    package: |-
      install -Dm755 "./go-arch" "${pkgdir}/usr/bin/go-arch"
      install -Dm644 "./README.md" "${pkgdir}/usr/share/doc/go-arch/README.md"

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
